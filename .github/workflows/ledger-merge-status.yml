name: ledger-merge-status
# PR 이 닫히면(머지 or 불채택) 경량 심사 장부의 `결과:` 칸을 자동으로 받아적는다.
# 사람 결정(머지/닫음)은 그대로 두고 기록만 하며, 장부에 줄이 없는 PR 은 건너뛴다.
# 장부(docs/history/light-review-log.md)는 repo 파일이라 Actions 로 갱신 가능
# — ~/.claude 와 달리 접근 제약 없음.
on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ledger-merge-status
  cancel-in-progress: false

jobs:
  record:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Record merge outcome in ledger
        id: rec
        shell: bash
        env:
          PR: ${{ github.event.pull_request.number }}
          MERGED: ${{ github.event.pull_request.merged }}
          SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          set -euo pipefail
          export DATE="$(date -u +%Y-%m-%d)"
          python3 .github/scripts/update_ledger.py
      - name: Commit and push
        if: steps.rec.outputs.changed == 'true'
        shell: bash
        env:
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/history/light-review-log.md
          git commit -m "chore(ledger): PR #${PR} 결과 자동 기록 [skip ci]"
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main
      - name: Comment on PR
        if: steps.rec.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const merged = context.payload.pull_request.merged;
            const body = merged
              ? '경량 심사 장부(`docs/history/light-review-log.md`)의 결과 칸을 **머지됨**으로 자동 기록했습니다.'
              : '경량 심사 장부(`docs/history/light-review-log.md`)의 결과 칸을 **닫힘·불채택**으로 자동 기록했습니다.';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });
